openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Africa Energy Investment Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Energy investment projects
  - name: stats
    description: Statistics and aggregations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all energy investment projects
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by project name
        - name: country
          in: query
          schema:
            type: string
          description: Filter by country
        - name: technology
          in: query
          schema:
            type: string
          description: Filter by technology type
        - name: status
          in: query
          schema:
            type: string
          description: Filter by project status
        - name: region
          in: query
          schema:
            type: string
          description: Filter by African region
        - name: minDealSize
          in: query
          schema:
            type: number
          description: Minimum deal size in USD millions
        - name: maxDealSize
          in: query
          schema:
            type: number
          description: Maximum deal size in USD millions
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"

    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectInput"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats/summary:
    get:
      operationId: getSummaryStats
      tags: [stats]
      summary: Get summary statistics
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryStats"

  /stats/by-country:
    get:
      operationId: getStatsByCountry
      tags: [stats]
      summary: Get investment statistics by country
      responses:
        "200":
          description: Country-level statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CountryStat"

  /stats/by-technology:
    get:
      operationId: getStatsByTechnology
      tags: [stats]
      summary: Get investment statistics by technology
      responses:
        "200":
          description: Technology-level statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TechStat"

  /stats/by-region:
    get:
      operationId: getStatsByRegion
      tags: [stats]
      summary: Get investment statistics by African region
      responses:
        "200":
          description: Regional statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RegionStat"

  /stats/by-year:
    get:
      operationId: getStatsByYear
      tags: [stats]
      summary: Get investment statistics by year
      responses:
        "200":
          description: Year-level statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/YearStat"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Project:
      type: object
      properties:
        id:
          type: integer
        projectName:
          type: string
        country:
          type: string
        region:
          type: string
        technology:
          type: string
        dealSizeUsdMn:
          type: number
          nullable: true
        investors:
          type: string
          nullable: true
        status:
          type: string
        description:
          type: string
          nullable: true
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        capacityMw:
          type: number
          nullable: true
        announcedYear:
          type: integer
          nullable: true
        closedYear:
          type: integer
          nullable: true
        sourceUrl:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - projectName
        - country
        - region
        - technology
        - status
        - createdAt

    CreateProjectInput:
      type: object
      properties:
        projectName:
          type: string
        country:
          type: string
        region:
          type: string
        technology:
          type: string
        dealSizeUsdMn:
          type: number
          nullable: true
        investors:
          type: string
          nullable: true
        status:
          type: string
        description:
          type: string
          nullable: true
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        capacityMw:
          type: number
          nullable: true
        announcedYear:
          type: integer
          nullable: true
        closedYear:
          type: integer
          nullable: true
        sourceUrl:
          type: string
          nullable: true
      required:
        - projectName
        - country
        - region
        - technology
        - status

    ProjectListResponse:
      type: object
      properties:
        projects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - projects
        - total
        - page
        - limit
        - totalPages

    SummaryStats:
      type: object
      properties:
        totalProjects:
          type: integer
        totalInvestmentUsdMn:
          type: number
        totalCountries:
          type: integer
        totalSectors:
          type: integer
        activeProjects:
          type: integer
        completedProjects:
          type: integer
      required:
        - totalProjects
        - totalInvestmentUsdMn
        - totalCountries
        - totalSectors
        - activeProjects
        - completedProjects

    CountryStat:
      type: object
      properties:
        country:
          type: string
        region:
          type: string
        projectCount:
          type: integer
        totalInvestmentUsdMn:
          type: number
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
      required:
        - country
        - region
        - projectCount
        - totalInvestmentUsdMn

    TechStat:
      type: object
      properties:
        technology:
          type: string
        projectCount:
          type: integer
        totalInvestmentUsdMn:
          type: number
      required:
        - technology
        - projectCount
        - totalInvestmentUsdMn

    RegionStat:
      type: object
      properties:
        region:
          type: string
        projectCount:
          type: integer
        totalInvestmentUsdMn:
          type: number
        countries:
          type: integer
      required:
        - region
        - projectCount
        - totalInvestmentUsdMn
        - countries

    YearStat:
      type: object
      properties:
        year:
          type: integer
        projectCount:
          type: integer
        totalInvestmentUsdMn:
          type: number
      required:
        - year
        - projectCount
        - totalInvestmentUsdMn
